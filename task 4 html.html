<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>
<body>

     <h2>Contact Form</h2> 

    <form>

        <!-- Name -->
        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name" required>
        <br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email" required>
        <br><br>

        <!--Contact-->
        <lable>Contact:</lable><br>
        <input type="number" placeholder="Enter your Contact no"  requuired>
        <br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>

        <!-- Skills -->
        <label>Skills:</label><br>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript
        <br><br>

        <!-- City Dropdown -->
        <label>Select City:</label><br>
        <select>
            <option></option>
            <option>Pune</option>
            <option>Mumbai</option>
            <option>Hyderabad</option>
            <option>Bangalore</option>
        </select>
        <br><br>

        <!-- Message -->
        <label>Message:</label><br>
        <textarea rows="3" cols="30" placeholder="Write your message"></textarea>
        <br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit" style="background-color: yellowgreen">

    </form>

</body>
</html>
