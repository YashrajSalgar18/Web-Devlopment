<!DOCTYPE html>
<html>
<head>
    <title>Blogging Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<fieldset>
<body>

    <div class="top-bar">
        <button onclick="togglePosts()">View Posts</button>
    </div>

    <div class="container">
        <h1>My Blogging Platform</h1>

        <input type="text" id="title" placeholder="Enter Blog Title">

        <textarea id="content" placeholder="Write your blog here..."></textarea>

        <button onclick="savePost()">Publish Post</button>
    </div>

    <div id="postsSection" style="display:none;">
        <h2>Published Posts</h2>
        <div id="posts"></div>
    </div>

    <script src="script.js"></script>

</body>
</fieldset>
</html>
